<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>マネ達 GA4 レポート（保護）</title>
<style>
  :root{--bg:#f6f8fb;--card:#fff;--ink:#0f1a24;--ink2:#586472;--muted:#8b95a2;
    --accent:#2a78d6;--border:rgba(15,26,36,.12);--err:#d03b3b}
  @media(prefers-color-scheme:dark){:root{--bg:#0e1013;--card:#181b1f;--ink:#eef2f7;
    --ink2:#b4bdc8;--muted:#7f8a97;--accent:#3987e5;--border:rgba(255,255,255,.12);--err:#e66767}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}
  .box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 30px;width:min(92vw,380px);box-shadow:0 8px 30px rgba(0,0,0,.12)}
  .eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:800;margin:0 0 8px}
  h1{font-size:19px;margin:0 0 4px;font-weight:800}
  p.sub{font-size:13px;color:var(--ink2);margin:0 0 20px;line-height:1.6}
  label{font-size:12.5px;color:var(--ink2);display:block;margin:0 0 6px}
  input{width:100%;padding:11px 13px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--ink);font-family:inherit}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  button{width:100%;margin-top:14px;padding:11px;font-size:15px;font-weight:700;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.6;cursor:default}
  .err{color:var(--err);font-size:12.5px;margin:12px 0 0;min-height:16px}
  .foot{font-size:11px;color:var(--muted);margin:18px 0 0;line-height:1.6}
  iframe{border:none;width:100%;height:100vh;display:block}
  @media(prefers-reduced-motion:reduce){*{transition:none}}
</style>
</head>
<body>
<div class="box" id="gate">
  <p class="eyebrow">CROCO 社内資料</p>
  <h1>マネーの達人 GA4 レポート</h1>
  <p class="sub">クライアント数値のため保護しています。共有されたパスワードを入力してください。</p>
  <form id="f"><label for="pw">パスワード</label>
    <input id="pw" type="password" autocomplete="off" autofocus>
    <button id="btn" type="submit">開く</button></form>
  <p class="err" id="err"></p>
  <p class="foot">出典：マネーの達人 GA4（manetatsu.com）。社外への転送はお控えください。</p>
</div>

const b2u=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function decrypt(pw){const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(P.salt),iterations:P.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(P.iv)},key,b2u(P.ct));
  return new TextDecoder().decode(plain);}
const f=document.getElementById("f"),err=document.getElementById("err"),btn=document.getElementById("btn");
f.addEventListener("submit",async e=>{e.preventDefault();err.textContent="";btn.disabled=true;btn.textContent="復号中…";
  try{const html=await decrypt(document.getElementById("pw").value);
    const fr=document.createElement("iframe");fr.srcdoc=html;
    document.body.textContent="";document.body.style.display="block";document.body.appendChild(fr);
  }catch(_){err.textContent="パスワードが違います。";btn.disabled=false;btn.textContent="開く";document.getElementById("pw").select();}});
